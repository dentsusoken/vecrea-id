version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm i -g pnpm
            - pnpm install
        build:
          commands:
            # SSR（ミドルウェアの fetchAuthSession）用: AMPLIFY_APP_ORIGIN 等を .env.production へ出す
            # @see https://docs.aws.amazon.com/amplify/latest/userguide/environment-variables.html
            - |
              set -e
              if [ -z "${AMPLIFY_APP_ORIGIN:-}" ]; then
                export AMPLIFY_APP_ORIGIN="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
              fi
              if [ -z "${NEXT_PUBLIC_APP_ORIGIN:-}" ]; then
                export NEXT_PUBLIC_APP_ORIGIN="$AMPLIFY_APP_ORIGIN"
              fi
              rm -f .env.production
              echo "AMPLIFY_APP_ORIGIN=$AMPLIFY_APP_ORIGIN" >> .env.production
              echo "USER_MANAGEMENT_API_BASE_URL=$USER_MANAGEMENT_API_BASE_URL" >> .env.production
              echo "OAUTH_TOKEN_URL=$OAUTH_TOKEN_URL" >> .env.production
              echo "OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID" >> .env.production
              echo "OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET" >> .env.production
              echo "OAUTH_SCOPE=$OAUTH_SCOPE" >> .env.production
              env | grep -e '^NEXT_PUBLIC_' >> .env.production || true
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: samples/id-integration-demo/user-management-app