# buildPath: pnpm ワークスペース根（node_modules / pnpm-lock がある階層）で install & build
# baseDirectory / cache は buildPath からの相対（FAQ: baseDirectory is relative to buildPath if specified）
# @see https://github.com/aws-amplify/amplify-hosting/blob/main/FAQ.md#support-for-monorepo-framework
version: 1
applications:
  - frontend:
      buildPath: projects/id-integration
      phases:
        preBuild:
          commands:
            - npm i -g pnpm
            - pnpm install
            # Amplify のビルド時検査用（シンボリックリンクにしない: standalone 内の next が絶対パス化するのを防ぐ）
            # @see https://github.com/aws-amplify/amplify-hosting/issues/4036
            - rm -rf packages/user-management-app/node_modules/next
            - mkdir -p packages/user-management-app/node_modules
            - cp -R node_modules/next packages/user-management-app/node_modules/
        build:
          commands:
            # SSR（ミドルウェアの fetchAuthSession）用: AMPLIFY_APP_ORIGIN 等を .env.production へ出す
            # @see https://docs.aws.amazon.com/amplify/latest/userguide/environment-variables.html
            - |
              set -e
              APP_DIR="packages/user-management-app"
              if [ -z "${AMPLIFY_APP_ORIGIN:-}" ]; then
                export AMPLIFY_APP_ORIGIN="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
              fi
              if [ -z "${NEXT_PUBLIC_APP_ORIGIN:-}" ]; then
                export NEXT_PUBLIC_APP_ORIGIN="$AMPLIFY_APP_ORIGIN"
              fi
              rm -f "$APP_DIR/.env.production"
              echo "AMPLIFY_APP_ORIGIN=$AMPLIFY_APP_ORIGIN" >> "$APP_DIR/.env.production"
              echo "USER_MANAGEMENT_API_BASE_URL=$USER_MANAGEMENT_API_BASE_URL" >> "$APP_DIR/.env.production"
              echo "OAUTH_TOKEN_URL=$OAUTH_TOKEN_URL" >> "$APP_DIR/.env.production"
              echo "OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID" >> "$APP_DIR/.env.production"
              echo "OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET" >> "$APP_DIR/.env.production"
              echo "OAUTH_SCOPE=$OAUTH_SCOPE" >> "$APP_DIR/.env.production"
              env | grep -e '^NEXT_PUBLIC_' >> "$APP_DIR/.env.production" || true
              pnpm --filter user-management-app run build
              # モノレポ + pnpm では standalone 内の node_modules/next がホストの絶対パスシンボリックリンクになる。
              # Lambda では壊れるので実体に差し替え、加えて output: 'standalone' 用の static / public を配置
              # @see https://nextjs.org/docs/app/api-reference/config/next-config-js/output
              INNER="$APP_DIR/.next/standalone/packages/user-management-app"
              if [ -d "$INNER" ]; then
                if [ -L "$INNER/node_modules/next" ] || [ -d "$INNER/node_modules/next" ]; then
                  rm -rf "$INNER/node_modules/next"
                fi
                cp -R "$APP_DIR/.next/standalone/node_modules/next" "$INNER/node_modules/next"
                mkdir -p "$INNER/.next"
                cp -R "$APP_DIR/.next/static" "$INNER/.next/static"
                if [ -d "$APP_DIR/public" ]; then
                  cp -R "$APP_DIR/public" "$INNER/public"
                fi
              fi
      artifacts:
        baseDirectory: packages/user-management-app/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - packages/user-management-app/.next/cache/**/*
    appRoot: projects/id-integration/packages/user-management-app