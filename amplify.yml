version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            # - npm install -g pnpm@10.33.0
            # Workspace root (pnpm-workspace.yaml + lockfile)
            # - cd ../.. && pnpm install --frozen-lockfile
            - npm install
        build:
          commands:
            # CWD = appRoot (packages/user-management-app). Must match Amplify monorepo app root in console.
            # SSR / server auth: bake env into .env.production for next build.
            # @see https://docs.aws.amazon.com/amplify/latest/userguide/environment-variables.html
            # NEXT_PUBLIC_* は next build の時点でインライン化される。コンソール未設定・プレビュー枝のみ未継承などだとクライアントで Missing env になる。
            - |
              set -e
              if [ -z "${AMPLIFY_APP_ORIGIN:-}" ]; then
                export AMPLIFY_APP_ORIGIN="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
              fi
              if [ -z "${NEXT_PUBLIC_APP_ORIGIN:-}" ]; then
                export NEXT_PUBLIC_APP_ORIGIN="$AMPLIFY_APP_ORIGIN"
              fi
              if [ -z "${USER_MANAGEMENT_API_BASE_URL:-}" ]; then
                export USER_MANAGEMENT_API_BASE_URL="$USER_MANAGEMENT_API_BASE_URL"
              fi
              if [ -z "${OAUTH_TOKEN_URL:-}" ]; then
                export OAUTH_TOKEN_URL="$OAUTH_TOKEN_URL"
              fi
              if [ -z "${OAUTH_CLIENT_ID:-}" ]; then
                export OAUTH_CLIENT_ID="$OAUTH_CLIENT_ID"
              fi
              if [ -z "${OAUTH_CLIENT_SECRET:-}" ]; then
                export OAUTH_CLIENT_SECRET="$OAUTH_CLIENT_SECRET"
              fi
              if [ -z "${OAUTH_SCOPE:-}" ]; then
                export OAUTH_SCOPE="$OAUTH_SCOPE"
              fi
              rm -f .env.production
              echo "USER_MANAGEMENT_API_BASE_URL=$USER_MANAGEMENT_API_BASE_URL" >> .env.production
              echo "OAUTH_TOKEN_URL=$OAUTH_TOKEN_URL" >> .env.production
              echo "OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID" >> .env.production
              echo "OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET" >> .env.production
              echo "OAUTH_SCOPE=$OAUTH_SCOPE" >> .env.production
              echo "AMPLIFY_APP_ORIGIN=$AMPLIFY_APP_ORIGIN" >> .env.production
              # createAuthRouteHandlers / getAmplifyAuthConfig は next build 時に評価される。
              # Cognito の NEXT_PUBLIC_* はここで必ず .env.production に含める（grep 任せにしない）。
              echo "NEXT_PUBLIC_APP_ORIGIN=$NEXT_PUBLIC_APP_ORIGIN" >> .env.production
              echo "NEXT_PUBLIC_USER_POOL_ID=$NEXT_PUBLIC_USER_POOL_ID" >> .env.production
              echo "NEXT_PUBLIC_USER_POOL_CLIENT_ID=$NEXT_PUBLIC_USER_POOL_CLIENT_ID" >> .env.production
              echo "NEXT_PUBLIC_COGNITO_DOMAIN=$NEXT_PUBLIC_COGNITO_DOMAIN" >> .env.production
              env | grep -e '^NEXT_PUBLIC_' >> .env.production || true
              if [ -z "${NEXT_PUBLIC_COGNITO_DOMAIN:-}" ] || [ -z "${NEXT_PUBLIC_USER_POOL_ID:-}" ] || [ -z "${NEXT_PUBLIC_USER_POOL_CLIENT_ID:-}" ]; then
                echo "ERROR: Amplify Hosting の環境変数に Cognito 用の次が必要です（ブランチ継承・プレビュー含む）: NEXT_PUBLIC_COGNITO_DOMAIN, NEXT_PUBLIC_USER_POOL_ID, NEXT_PUBLIC_USER_POOL_CLIENT_ID"
                exit 1
              fi
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: projects/id-integration/packages/user-management-app
