version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.33.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            # SSR / server auth: write .env.production next to the Next app, then build via workspace filter.
            # @see https://docs.aws.amazon.com/amplify/latest/userguide/environment-variables.html
            - |
              set -e
              APP_DIR=packages/user-management-app
              if [ -z "${AMPLIFY_APP_ORIGIN:-}" ]; then
                export AMPLIFY_APP_ORIGIN="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
              fi
              if [ -z "${NEXT_PUBLIC_APP_ORIGIN:-}" ]; then
                export NEXT_PUBLIC_APP_ORIGIN="$AMPLIFY_APP_ORIGIN"
              fi
              rm -f "$APP_DIR/.env.production"
              echo "AMPLIFY_APP_ORIGIN=$AMPLIFY_APP_ORIGIN" >> "$APP_DIR/.env.production"
              echo "NEXT_PUBLIC_APP_ORIGIN=$NEXT_PUBLIC_APP_ORIGIN" >> "$APP_DIR/.env.production"
              env | grep -e '^NEXT_PUBLIC_' >> "$APP_DIR/.env.production" || true
              env | grep -e '^USER_MANAGEMENT_API_BASE_URL=' >> "$APP_DIR/.env.production" || true
              env | grep -e '^OAUTH_TOKEN_URL=' >> "$APP_DIR/.env.production" || true
              env | grep -e '^OAUTH_CLIENT_ID=' >> "$APP_DIR/.env.production" || true
              env | grep -e '^OAUTH_CLIENT_SECRET=' >> "$APP_DIR/.env.production" || true
              env | grep -e '^OAUTH_SCOPE=' >> "$APP_DIR/.env.production" || true
              pnpm --filter user-management-app run build
      artifacts:
        baseDirectory: packages/user-management-app/.next
        files:
          - '**/*'
      cache:
        paths:
          - packages/user-management-app/.next/cache/**/*
          - node_modules/**/*
    appRoot: projects/id-integration
