version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.33.0
            # Workspace root (pnpm-workspace.yaml + lockfile)
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            # CWD = appRoot (packages/user-management-app). Must match Amplify monorepo app root in console.
            # SSR / server auth: bake env into .env.production for next build.
            # @see https://docs.aws.amazon.com/amplify/latest/userguide/environment-variables.html
            - |
              set -e
              if [ -z "${AMPLIFY_APP_ORIGIN:-}" ]; then
                export AMPLIFY_APP_ORIGIN="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
              fi
              if [ -z "${NEXT_PUBLIC_APP_ORIGIN:-}" ]; then
                export NEXT_PUBLIC_APP_ORIGIN="$AMPLIFY_APP_ORIGIN"
              fi
              rm -f .env.production
              echo "AMPLIFY_APP_ORIGIN=$AMPLIFY_APP_ORIGIN" >> .env.production
              echo "NEXT_PUBLIC_APP_ORIGIN=$NEXT_PUBLIC_APP_ORIGIN" >> .env.production
              env | grep -e '^NEXT_PUBLIC_' >> .env.production || true
              env | grep -e '^USER_MANAGEMENT_API_BASE_URL=' >> .env.production || true
              env | grep -e '^OAUTH_TOKEN_URL=' >> .env.production || true
              env | grep -e '^OAUTH_CLIENT_ID=' >> .env.production || true
              env | grep -e '^OAUTH_CLIENT_SECRET=' >> .env.production || true
              env | grep -e '^OAUTH_SCOPE=' >> .env.production || true
              pnpm exec next build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: projects/id-integration/packages/user-management-app
